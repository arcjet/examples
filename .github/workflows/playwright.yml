name: Playwright Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  example-nextjs:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
      - name: Build Docker image
        run: docker build -t example-nextjs examples/nextjs
      - name: Extract build manifest
        run: |
          mkdir -p examples/nextjs/.next
          docker create --name temp-nextjs example-nextjs
          docker cp temp-nextjs:/app/.next/app-path-routes-manifest.json examples/nextjs/.next/app-path-routes-manifest.json
          docker rm temp-nextjs
      - name: Start container
        run: |
          docker run -d --name example-nextjs-app -p 3000:3000 \
            -e ARCJET_ENV=development \
            -e AUTH_SECRET=playwright \
            -e AUTH_TRUST_HOST=http://127.0.0.1:3000 \
            -e AUTH_GITHUB_ID=playwright \
            -e AUTH_GITHUB_SECRET=playwright \
            example-nextjs
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server did not start in time"
          exit 1
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
